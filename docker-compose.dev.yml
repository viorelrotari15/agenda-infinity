# Hot reload: mount source, keep image node_modules, run dev servers.
# Usage: pnpm docker:dev   (or: docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build)
#
# Bind mounts + file watching on Windows/macOS often need polling (set below).
# Anonymous /workspace/node_modules keeps deps from the image instead of the host.

services:
  api:
    volumes:
      - .:/workspace
      - /workspace/node_modules
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: 'true'
    command:
      - sh
      - -c
      - >-
        pnpm --filter @agenda/api exec prisma generate
        && node apps/api/scripts/db-push.cjs
        && pnpm --filter @agenda/api run seed
        && pnpm exec turbo run dev --parallel
        --filter=@agenda/shared --filter=@agenda/api-client --filter=@agenda/api
    healthcheck:
      disable: true

  web:
    volumes:
      - .:/workspace
      - /workspace/node_modules
    environment:
      NODE_ENV: development
      VITE_USE_POLLING: 'true'
      VITE_PROXY_API_TARGET: http://api:3001
      VITE_API_URL: http://localhost:3001/api
    command:
      - sh
      - -c
      - >-
        pnpm --filter @agenda/shared build && pnpm --filter @agenda/api-client build
        && pnpm --filter @agenda/app exec vite --host 0.0.0.0 --port 5173
    depends_on:
      api:
        condition: service_started
