services:
  postgres:
    image: postgres:16-alpine
    container_name: agenda-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agenda_infinity
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d agenda_infinity']
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: agenda-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: agenda-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/agenda_infinity
      JWT_SECRET: change-me
      PORT: 3001
      REDIS_URL: redis://redis:6379
    ports:
      - '3001:3001'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(''http://127.0.0.1:3001/api/specialists'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 90s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  web:
    build:
      context: .
      dockerfile: apps/app/Dockerfile
      args:
        VITE_API_URL: http://localhost:3001/api
    container_name: agenda-web
    restart: unless-stopped
    ports:
      - '5173:5173'
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
